<!DOCTYPE html>

<head>

  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .not-found-wrap {
      min-height: 70vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 60px 24px;
      gap: 16px;
    }
    .nf-code {
      font-size: 6rem;
      font-weight: 900;
      color: var(--primary);
      line-height: 1;
      letter-spacing: -.04em;
    }
    .nf-icon { font-size: 2.5rem; margin-bottom: 4px; }
    .nf-title {
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--text-main);
    }
    .nf-desc {
      font-size: .95rem;
      color: var(--text-sub);
      line-height: 1.7;
      max-width: 380px;
    }
    .nf-btns {
      display: flex;
      gap: 12px;
      margin-top: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .nf-search {
      display: flex;
      gap: 8px;
      max-width: 400px;
      width: 100%;
    }
    .nf-search input {
      flex: 1;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: .9rem;
      outline: none;
    }
    .nf-search input:focus { border-color: var(--primary); }
  </style>
</head>
